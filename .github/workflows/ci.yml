name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  content-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Reject prohibited vendor/model references
        id: content_policy
        shell: bash
        run: |
          set +e
          first_term="Anthro""pic"
          second_term="Clau""de"
          output="$(
            set -euo pipefail
            violations=0
            for term in "$first_term" "$second_term"; do
              matches="$(git grep -n -I -i -F -- "$term" -- . || true)"
              if [ -n "$matches" ]; then
                echo "Tracked file content contains prohibited keyword: $term"
                echo "$matches"
                violations=1
              fi
            done

            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            else
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
            fi

            if [ -n "$base" ] && [ "$base" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$base^{commit}" 2>/dev/null; then
              messages="$(git log --format=%B "$base..$head")"
            else
              messages="$(git log --format=%B -n 1 "$head")"
            fi

            for term in "$first_term" "$second_term"; do
              if grep -qiF -- "$term" <<< "$messages"; then
                echo "Commit message contains prohibited keyword: $term"
                violations=1
              fi
            done

            exit "$violations"
          )"
          status="$?"
          {
            echo "output<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$output"
          exit "$status"

      - name: Close prohibited-content PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          POLICY_OUTPUT: ${{ steps.content_policy.outputs.output }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "This PR was closed automatically because it violates the repository content policy."
            echo
            echo "Prohibited vendor/model references are not accepted in code or commit messages."
            echo
            echo '```text'
            printf '%s\n' "$POLICY_OUTPUT"
            echo '```'
          } > content-policy-comment.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file content-policy-comment.md
          gh pr close "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

  discover-baselines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enumerate protocol baselines
        id: baselines
        shell: pwsh
        run: |
          $baselineDirectories = Get-ChildItem -Path protocol -Directory |
            Sort-Object Name |
            Where-Object { Test-Path (Join-Path $_.FullName 'manifest.json') }

          $baselineIndex = 1
          $baselines = $baselineDirectories | ForEach-Object {
              $manifest = Get-Content -Raw (Join-Path $_.FullName 'manifest.json') | ConvertFrom-Json
              $baselineId = 'baseline-{0:D2}' -f $baselineIndex
              $baselineIndex += 1
              [pscustomobject]@{
                baseline_id = $baselineId
                protocol_version = $manifest.protocol_version
              }
            }

          if ($baselines.Count -eq 0) {
            throw 'No protocol baselines were found under protocol/.'
          }

          "matrix=$($baselines | ConvertTo-Json -Compress)" >> $env:GITHUB_OUTPUT

    outputs:
      matrix: ${{ steps.baselines.outputs.matrix }}

  verify-workspace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clear preinstalled pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain uninstall 1.85.0
          exit 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

  verify-baselines:
    name: verify-${{ matrix.baseline_id }}
    needs:
      - discover-baselines
      - verify-workspace
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-baselines.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run baseline conformance
        uses: ./.github/actions/run-conformance
        with:
          protocol-version: ${{ matrix.protocol_version }}
          artifact-name: conformance-${{ matrix.baseline_id }}

  verify:
    needs:
      - content-policy
      - discover-baselines
      - verify-workspace
      - verify-baselines
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Enforce required CI path
        shell: bash
        run: |
          if [ "${{ needs.content-policy.result }}" != "success" ]; then
            echo "Repository content policy validation failed."
            exit 1
          fi

          if [ "${{ needs.discover-baselines.result }}" != "success" ]; then
            echo "Baseline discovery failed."
            exit 1
          fi

          if [ "${{ needs.verify-workspace.result }}" != "success" ]; then
            echo "Workspace formatting, lint, or tests failed."
            exit 1
          fi

          if [ "${{ needs.verify-baselines.result }}" != "success" ]; then
            echo "One or more protocol baselines failed shared conformance verification."
            exit 1
          fi
